name: "[Hex] Publish"

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # To leverage devenv inside Github Actions
      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: "[Gleam] Build the package's documentation"
        run: |
          nix develop --impure --command gleam docs build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/dev/docs/eparch/

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-to-hex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Publish to Hex
        run: nix develop --impure --command gleam publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
